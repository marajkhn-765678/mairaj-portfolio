<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Banao — Dev Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a25;
    --accent: #00e5a0; --accent2: #7c6fff;
    --text: #e8e8f0; --muted: #7a7a9a;
    --border: rgba(255,255,255,0.08); --card: rgba(255,255,255,0.04);
    --danger: #ff5c5c; --success: #00e5a0;
  }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 600px 400px at 20% 50%, rgba(124,111,255,0.07) 0%, transparent 70%), radial-gradient(ellipse 400px 400px at 80% 20%, rgba(0,229,160,0.06) 0%, transparent 70%); pointer-events: none; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 440px; position: relative; z-index: 1; animation: slideUp 0.5s ease both; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .logo { font-family: 'Space Mono', monospace; font-size: 15px; color: var(--accent); margin-bottom: 32px; display: block; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .subtitle a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-family: 'Space Mono', monospace; }
  input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 15px; font-family: 'Syne', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: rgba(124,111,255,0.5); box-shadow: 0 0 0 3px rgba(124,111,255,0.08); }
  .error-msg { font-size: 12px; color: var(--danger); margin-top: 6px; font-family: 'Space Mono', monospace; display: none; }
  .error-msg.show { display: block; }
  .strength-bar { height: 3px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 3px; width: 0; transition: width 0.3s, background 0.3s; }
  .strength-text { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'Space Mono', monospace; }
  .btn { width: 100%; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; padding: 14px; border-radius: 10px; border: none; cursor: pointer; margin-top: 8px; transition: transform 0.2s, box-shadow 0.2s; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.25); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--muted); font-size: 12px; font-family: 'Space Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .toast { position: fixed; top: 24px; right: 24px; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; transform: translateX(120%); transition: transform 0.3s ease; font-family: 'Space Mono', monospace; }
  .toast.show { transform: translateX(0); }
  .toast.success-toast { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.3); color: var(--accent); }
  .toast.error-toast { background: rgba(255,92,92,0.15); border: 1px solid rgba(255,92,92,0.3); color: var(--danger); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="card">
  <span class="logo">&lt;dev /&gt;</span>
  <h1 data-en="Create Account 🚀" data-ru="Account Banao 🚀">Account Banao 🚀</h1>
  <p class="subtitle">
    <span data-en="Already have an account?" data-ru="Pehle se account hai?">Pehle se account hai?</span>
    <a href="login.html" data-en="Login here" data-ru="Login karo">Login karo</a>
  </p>

  <div class="field">
    <label data-en="Full Name" data-ru="Poora Naam">Poora Naam</label>
    <input type="text" id="name" placeholder="Jaise: Ali Hassan" autocomplete="off">
    <p class="error-msg" id="name-err" data-en="Name must be at least 3 characters" data-ru="Naam kam se kam 3 characters ka hona chahiye">Naam kam se kam 3 characters ka hona chahiye</p>
  </div>

  <div class="field">
    <label data-en="Gmail Address" data-ru="Gmail Address">Gmail Address</label>
    <input type="email" id="email" placeholder="tumhara@gmail.com" autocomplete="off">
    <p class="error-msg" id="email-err" data-en="Write a valid Gmail address" data-ru="Sahi Gmail address likho">Sahi Gmail address likho</p>
  </div>

  <div class="field">
    <label data-en="Password" data-ru="Password">Password</label>
    <input type="password" id="password" placeholder="Strong password likho" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <p class="strength-text" id="strength-text" data-en="Password strength will show here" data-ru="Password ki strength yahan dikhegi">Password ki strength yahan dikhegi</p>
    <p class="error-msg" id="pass-err" data-en="Password must be at least 6 characters" data-ru="Password kam se kam 6 characters ka hona chahiye">Password kam se kam 6 characters ka hona chahiye</p>
  </div>

  <div class="field">
    <label data-en="Confirm Password" data-ru="Password Confirm Karo">Password Confirm Karo</label>
    <input type="password" id="confirm" placeholder="Wahi password dobara likho">
    <p class="error-msg" id="confirm-err" data-en="Both passwords don't match!" data-ru="Dono passwords match nahi kar rahe!">Dono passwords match nahi kar rahe!</p>
  </div>

  <button class="btn" onclick="doSignup()" id="signupBtn" data-en="Create Account →" data-ru="Account Banao →">Account Banao →</button>

  <div class="divider" data-en="or" data-ru="ya">ya</div>
  <p style="text-align:center; font-size:13px; color:var(--muted)">
    <span data-en="Already have account?" data-ru="Already account hai?">Already account hai?</span>
    <a href="login.html" style="color:var(--accent); font-weight:700; text-decoration:none" data-en="Login →" data-ru="Login karo →">Login karo →</a>
  </p>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // ✅ Aapki Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDTVyksPVDRfU9VvBa0r5Wvke6WSGUN3jU",
    authDomain: "mairaj-portfolio.firebaseapp.com",
    projectId: "mairaj-portfolio",
    storageBucket: "mairaj-portfolio.firebasestorage.app",
    messagingSenderId: "687007303119",
    appId: "1:687007303119:web:9fb778c743ba4c78207eba",
    measurementId: "G-F9PGE0KFS5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Functions global banao
  window.checkStrength = function(val) {
    const lang = localStorage.getItem('siteLang') || 'ru';
    const fill = document.getElementById('strength-fill');
    const text = document.getElementById('strength-text');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = lang === 'en'
      ? [{ w:'0%',c:'transparent',t:'Enter a password'},{ w:'25%',c:'#ff5c5c',t:'⚠️ Very Weak'},{ w:'50%',c:'#ffaa00',t:'😐 Okay'},{ w:'75%',c:'#7c6fff',t:'👍 Good'},{ w:'90%',c:'#00e5a0',t:'💪 Strong!'},{ w:'100%',c:'#00e5a0',t:'🔥 Very Strong!'}]
      : [{ w:'0%',c:'transparent',t:'Password likho'},{ w:'25%',c:'#ff5c5c',t:'⚠️ Bohot weak'},{ w:'50%',c:'#ffaa00',t:'😐 Theek hai'},{ w:'75%',c:'#7c6fff',t:'👍 Accha hai'},{ w:'90%',c:'#00e5a0',t:'💪 Strong!'},{ w:'100%',c:'#00e5a0',t:'🔥 Bohot Strong!'}];
    const l = levels[score] || levels[0];
    fill.style.width = l.w; fill.style.background = l.c;
    text.textContent = l.t; text.style.color = l.c;
  };

  window.showToast = function(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  };

  window.doSignup = async function() {
    const lang = localStorage.getItem('siteLang') || 'ru';
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('signupBtn');
    let valid = true;

    document.getElementById('name-err').classList.toggle('show', name.length < 3);
    if (name.length < 3) valid = false;
    document.getElementById('email-err').classList.toggle('show', !email.includes('@'));
    if (!email.includes('@')) valid = false;
    document.getElementById('pass-err').classList.toggle('show', pass.length < 6);
    if (pass.length < 6) valid = false;
    document.getElementById('confirm-err').classList.toggle('show', pass !== confirm);
    if (pass !== confirm) valid = false;

    if (!valid) {
      window.showToast(lang === 'en' ? '❌ Fix all errors first!' : '❌ Pehle sari galtiyan theek karo!', 'error-toast');
      return;
    }

    btn.disabled = true;
    btn.textContent = lang === 'en' ? 'Creating...' : 'Ban raha hai...';

    try {
      // Check if user already exists
      const userRef = doc(db, 'users', email);
      const userSnap = await getDoc(userRef);

      if (userSnap.exists()) {
        window.showToast(lang === 'en' ? '⚠️ This email is already registered!' : '⚠️ Yeh email already registered hai!', 'error-toast');
        btn.disabled = false;
        btn.textContent = lang === 'en' ? 'Create Account →' : 'Account Banao →';
        return;
      }

      // Save user to Firebase
      await setDoc(userRef, {
        name: name,
        email: email,
        password: pass,
        createdAt: new Date().toISOString()
      });

      window.showToast(lang === 'en' ? '✅ Account created! Going to login...' : '✅ Account ban gaya! Login page pe ja raha hun...', 'success-toast');
      setTimeout(() => window.location.href = 'login.html', 2000);

    } catch (error) {
      console.error(error);
      window.showToast(lang === 'en' ? '❌ Error! Try again.' : '❌ Error! Dobara try karo.', 'error-toast');
      btn.disabled = false;
      btn.textContent = lang === 'en' ? 'Create Account →' : 'Account Banao →';
    }
  };
</script>

<script src="lang.js"></script>
</body>
</html>
