<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mairaj — Web Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">

<style>
*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --blue:#1557ff;
  --blue2:#4d80ff;
  --blue3:#eef3ff;
  --blue4:#c5d5ff;
  --white:#fff;
  --light:#f8faff;
  --text:#0c122d;
  --muted:#66719c;
  --border:#dde7ff;
}

html{ scroll-behavior:smooth; }

body{
  background:white;
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* NAVIGATION */
nav{
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 32px);
  max-width:1150px;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.8rem 1.4rem;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:100px;
  box-shadow:0 10px 40px rgba(21,87,255,0.08);
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.25rem;
  font-weight:700;
  background:linear-gradient(135deg,#1557ff,#78a6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.nav-links{
  display:flex;
  list-style:none;
  gap:0.4rem;
}

.nav-links a{
  text-decoration:none;
  color:var(--muted);
  font-size:0.84rem;
  font-weight:600;
  padding:0.55rem 1rem;
  border-radius:999px;
  transition:0.3s;
}

.nav-links a:hover,
.nav-links a.active{
  background:var(--blue3);
  color:var(--blue);
}

.nav-hire{
  text-decoration:none;
  padding:0.8rem 1.3rem;
  border-radius:14px;
  background:linear-gradient(135deg,#1557ff,#3d7cff);
  color:white;
  font-size:0.82rem;
  font-weight:700;
  box-shadow:0 10px 30px rgba(21,87,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
  transition:0.3s;
}

.nav-hire:hover{
  transform:translateY(-3px);
}

/* HERO */
#hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:7rem 6% 4rem;
  background: radial-gradient(circle at top right,#dfe9ff 0%,transparent 35%), radial-gradient(circle at bottom left,#edf3ff 0%,transparent 35%), white;
  position:relative;
  overflow:hidden;
}

.hero-shapes{ position:absolute; inset:0; pointer-events:none; }
.shape{ position:absolute; border-radius:50%; opacity:0.12; }
.s1{ width:500px; height:500px; background:#1557ff; top:-150px; right:-100px; animation:float 8s ease-in-out infinite; }
.s2{ width:300px; height:300px; background:#6a9fff; bottom:-100px; left:50%; animation:float 6s ease-in-out infinite; }
.s3{ width:180px; height:180px; background:#4d80ff; top:40%; left:60%; animation:float 7s ease-in-out infinite; }

@keyframes float{
  0%,100%{ transform:translateY(0px); }
  50%{ transform:translateY(-20px); }
}

.hero-inner{ position:relative; z-index:2; max-width:760px; }
.hero-badge{ display:inline-flex; align-items:center; gap:10px; padding:0.55rem 1.1rem; background:rgba(255,255,255,0.7); border:1px solid var(--border); border-radius:999px; color:var(--blue); font-size:0.8rem; font-weight:700; margin-bottom:1.7rem; backdrop-filter:blur(20px); }
.badge-dot{ width:9px; height:9px; background:#22c55e; border-radius:50%; box-shadow:0 0 0 6px rgba(34,197,94,0.15); animation:pulse 2s infinite; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 6px rgba(34,197,94,0.15); } 50%{ box-shadow:0 0 0 14px rgba(34,197,94,0.04); } }

h1{ font-family:'Space Grotesk',sans-serif; font-size:clamp(3rem,8vw,6rem); line-height:0.95; letter-spacing:-3px; text-transform:uppercase; margin-bottom:1.5rem; }
.h1-grey{ color:#c3cae7; }
.h1-blue{ background:linear-gradient(135deg,#1557ff,#78a6ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.hero-sub{ max-width:520px; color:var(--muted); line-height:1.9; font-size:1rem; margin-bottom:2.5rem; }
.hero-sub b{ color:var(--text); }

.hero-btns{ display:flex; gap:1rem; flex-wrap:wrap; }
.btn-primary{ padding:1rem 2.2rem; border:none; border-radius:18px; background:linear-gradient(135deg,#1557ff,#3d7cff); color:white; font-size:0.92rem; font-weight:700; cursor:pointer; transition:0.3s; box-shadow:0 10px 30px rgba(21,87,255,0.25), inset 0 1px 0 rgba(255,255,255,0.25); }
.btn-primary:hover{ transform:translateY(-4px); box-shadow:0 20px 40px rgba(21,87,255,0.35); }
.btn-secondary{ padding:1rem 2.2rem; border-radius:18px; border:1px solid var(--border); background:white; font-size:0.92rem; font-weight:700; cursor:pointer; transition:0.3s; }
.btn-secondary:hover{ transform:translateY(-4px); border-color:var(--blue); color:var(--blue); }

/* CARDS SECTION */
#portfolio{
  padding:6rem 6%;
  background:var(--light);
  display:flex;
  flex-wrap:wrap;
  gap:2rem;
  justify-content:center;
}

.card{
  background:white;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(21,87,255,0.08);
  padding:2rem;
  width:250px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(21,87,255,0.15);
}

.card img{
  width:80px;
  margin-bottom:1rem;
}

.card h3{
  font-size:1.1rem;
  margin-bottom:0.5rem;
  color:var(--text);
}

.card p{
  font-size:0.8rem;
  color:var(--muted);
}

/* FOOTER */
footer{
  text-align:center;
  padding:4rem 2rem;
  color:var(--muted);
  font-size:0.85rem;
}

</style>
</head>
<body>

<nav>
  <div class="logo">Mairaj</div>
  <ul class="nav-links">
    <li><a href="#hero" class="active">Home</a></li>
    <
