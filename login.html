<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Dev Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a25;
    --accent: #00e5a0; --accent2: #7c6fff;
    --text: #e8e8f0; --muted: #7a7a9a;
    --border: rgba(255,255,255,0.08); --card: rgba(255,255,255,0.04);
    --danger: #ff5c5c;
  }
  body {
    font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 500px 400px at 80% 50%, rgba(0,229,160,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 400px 400px at 20% 20%, rgba(124,111,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 420px; position: relative; z-index: 1; animation: slideUp 0.5s ease both; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .logo { font-family: 'Space Mono', monospace; font-size: 15px; color: var(--accent); margin-bottom: 32px; display: block; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .subtitle a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .subtitle a:hover { text-decoration: underline; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-family: 'Space Mono', monospace; }
  .input-wrap { position: relative; }
  input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 15px; font-family: 'Syne', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus { border-color: rgba(0,229,160,0.4); box-shadow: 0 0 0 3px rgba(0,229,160,0.07); }
  input.shake { animation: shake 0.4s ease; border-color: var(--danger) !important; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
  .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; transition: color 0.2s; }
  .eye-btn:hover { color: var(--text); }
  .error-box { background: rgba(255,92,92,0.08); border: 1px solid rgba(255,92,92,0.25); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--danger); font-family: 'Space Mono', monospace; margin-bottom: 16px; display: none; animation: fadeIn 0.3s ease; }
  .error-box.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .attempts-warning { font-size: 12px; color: #ffaa00; font-family: 'Space Mono', monospace; text-align: center; margin-top: 8px; display: none; }
  .attempts-warning.show { display: block; }
  .btn { width: 100%; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; padding: 14px; border-radius: 10px; border: none; cursor: pointer; margin-top: 8px; transition: transform 0.2s, box-shadow 0.2s; letter-spacing: 0.3px; }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.25); }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--muted); font-size: 12px; font-family: 'Space Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .success-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  .success-overlay.show { opacity: 1; pointer-events: all; }
  .success-icon { font-size: 64px; margin-bottom: 20px; animation: bounceIn 0.5s ease both; }
  @keyframes bounceIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .success-msg { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: -1px; }
  .success-sub { font-size: 14px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .progress-bar { width: 200px; height: 3px; background: var(--border); border-radius: 3px; margin-top: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0; transition: width 1.8s linear; }
</style>
</head>
<body>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✅</div>
  <p class="success-msg" id="welcomeMsg">Welcome back!</p>
  <p class="success-sub" data-en="Taking you to profile page..." data-ru="Profile page par ja raha hun...">Profile page par ja raha hun...</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="card" id="loginCard">
  <span class="logo">&lt; Mairaj.code /&gt;</span>

  <!-- h1 aur subtitle mein data attributes hain -->
  <h1 data-en="Welcome Back! 👋" data-ru="Wapis Aa Gaye! 👋">Wapis Aa Gaye! 👋</h1>
  <p class="subtitle">
    <span data-en="Don't have an account?" data-ru="Account nahi hai?">Account nahi hai?</span>
    <a href="signup.html" data-en="Create one now" data-ru="Abhi banao">Abhi banao</a>
  </p>

  <div class="error-box" id="errorBox">❌ <span id="errorText"></span></div>

  <div class="field">
    <label data-en="Gmail Address" data-ru="Gmail Address">Gmail Address</label>
    <input type="email" id="email" placeholder="tumhara@gmail.com"
      onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <div class="field">
    <label data-en="Password" data-ru="Password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password"
        data-en-placeholder="Enter your password"
        data-ru-placeholder="Apna password likho"
        placeholder="Apna password likho"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button class="eye-btn" onclick="togglePass()" id="eyeBtn">👁️</button>
    </div>
  </div>

  <p class="attempts-warning" id="attemptsWarn"></p>

  <button class="btn" onclick="doLogin()" id="loginBtn"
    data-en="Login →" data-ru="Login Karo →">Login Karo →</button>

  <div class="divider" data-en="or" data-ru="ya">ya</div>
  <p style="text-align:center; font-size:13px; color:var(--muted)">
    <span data-en="Need a new account?" data-ru="Naya account chahiye?">Naya account chahiye?</span>
    <a href="signup.html" style="color:var(--accent); font-weight:700; text-decoration:none"
       data-en="Signup →" data-ru="Signup karo →">Signup karo →</a>
  </p>
</div>

<script>
  let attempts = 0;
  const MAX_ATTEMPTS = 5;

  function togglePass() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    document.getElementById('errorText').textContent = msg;
    box.classList.add('show');
    document.getElementById('email').classList.add('shake');
    document.getElementById('password').classList.add('shake');
    setTimeout(() => {
      document.getElementById('email').classList.remove('shake');
      document.getElementById('password').classList.remove('shake');
    }, 500);
  }

  function hideError() { document.getElementById('errorBox').classList.remove('show'); }

  function doLogin() {
    const btn = document.getElementById('loginBtn');
    if (btn.disabled) return;
    const lang = localStorage.getItem('siteLang') || 'ru';

    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;

    if (!email || !pass) {
      showError(lang === 'en' ? 'Email and Password both required!' : 'Email aur Password dono zaroori hain!');
      return;
    }
    if (!email.includes('@')) {
      showError(lang === 'en' ? 'Write correct email format (@ required)' : 'Sahi email format likho (@ chahiye)');
      return;
    }

    const users = JSON.parse(localStorage.getItem('devUsers') || '[]');
    const user = users.find(u => u.email === email);

    if (!user) {
      attempts++;
      showError(lang === 'en' ? 'This email is not registered! Please signup first. 👇' : 'Yeh email registered nahi hai! Pehle signup karo. 👇');
      setTimeout(() => { window.location.href = 'signup.html'; }, 2000);
      checkAttempts();
      return;
    }

    if (user.password !== pass) {
      attempts++;
      showError(lang === 'en' ? 'Wrong password! Try again.' : 'Password galat hai! Dobara try karo.');
      checkAttempts();
      return;
    }

    hideError();
    attempts = 0;
    localStorage.setItem('loggedInUser', JSON.stringify(user));

    const overlay = document.getElementById('successOverlay');
    const lang2 = localStorage.getItem('siteLang') || 'ru';
    document.getElementById('welcomeMsg').textContent = lang2 === 'en'
      ? `Welcome, ${user.name}! 🎉`
      : `Welcome, ${user.name}! 🎉`;
    overlay.classList.add('show');
    setTimeout(() => { document.getElementById('progressFill').style.width = '100%'; }, 100);
    setTimeout(() => { window.location.href = 'portfolio.html'; }, 2000);
  }

  function checkAttempts() {
    const lang = localStorage.getItem('siteLang') || 'ru';
    const warn = document.getElementById('attemptsWarn');
    const btn = document.getElementById('loginBtn');
    const remaining = MAX_ATTEMPTS - attempts;

    if (attempts >= MAX_ATTEMPTS) {
      warn.textContent = lang === 'en' ? '🔒 Too many wrong attempts! Wait 30 seconds.' : '🔒 Bohot zyada galat attempts! 30 second wait karo.';
      warn.classList.add('show');
      btn.disabled = true;
      let count = 30;
      btn.textContent = lang === 'en' ? `Wait... (${count}s)` : `Wait karo... (${count}s)`;
      const timer = setInterval(() => {
        count--;
        btn.textContent = lang === 'en' ? `Wait... (${count}s)` : `Wait karo... (${count}s)`;
        if (count <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = lang === 'en' ? 'Login →' : 'Login Karo →';
          attempts = 0;
          warn.classList.remove('show');
        }
      }, 1000);
    } else if (attempts >= 3) {
      warn.textContent = lang === 'en' ? `⚠️ ${remaining} attempts left!` : `⚠️ ${remaining} attempts bacha hai!`;
      warn.classList.add('show');
    }
  }
</script>

<!-- ✅ LANGUAGE TOGGLE — Yeh line ZAROORI hai har page mein -->
<script src="lang.js"></script>

</body>
</html>
